<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LUXE Easy Peptide Calculator</title>

<style>
body { font-family: Arial; background:#fbf4e8; margin:0; padding:20px; color:#2b1b1b; }
.container { max-width:900px; margin:auto; }
.card { background:white; padding:20px; border-radius:20px; margin-bottom:20px; box-shadow:0 10px 25px rgba(0,0,0,0.08); }
h1 { color:#6f0718; }
label { font-weight:bold; color:#6f0718; display:block; margin-top:15px; }
select, input { width:100%; padding:12px; border-radius:10px; border:1px solid #ccc; margin-top:5px; font-size:18px; }
.buttons { display:grid; grid-template-columns:repeat(5,1fr); gap:8px; margin-top:10px; }
button { padding:10px; border-radius:10px; border:none; font-weight:bold; cursor:pointer; }
.active { background:#6f0718; color:white; }
.result { background:#6f0718; color:white; padding:20px; border-radius:20px; margin-top:20px; }
.big { font-size:36px; color:#ffd87a; }
.footer { text-align:center; font-size:12px; margin-top:20px; }
.linkBtn { background:#6f0718; color:white; padding:10px 15px; border-radius:20px; text-decoration:none; display:inline-block; margin-top:10px; }
</style>
</head>

<body>
<div class="container">

<div class="card">
<h1>LUXE</h1>
<p><strong>Easy Peptide Calculator</strong></p>
<p>For research purposes only. Not for human consumption.</p>
</div>

<div class="card">
<h2>Calculator</h2>

<label>1. What is the vial concentration?</label>
<select id="vialSelect">
<option value="5">5 mg</option>
<option value="10" selected>10 mg</option>
<option value="15">15 mg</option>
<option value="20">20 mg</option>
<option value="30">30 mg</option>
<option value="40">40 mg</option>
<option value="50">50 mg</option>
<option value="60">60 mg</option>
<option value="80">80 mg</option>
<option value="100">100 mg</option>
<option value="500">500 mg</option>
<option value="1000">1000 mg</option>
</select>

<label>2. How much BAC water did you add?</label>
<div class="buttons">
<button class="waterBtn" data-water="1">1mL</button>
<button class="waterBtn" data-water="2">2mL</button>
<button class="waterBtn active" data-water="3">3mL</button>
<button class="waterBtn" data-water="5">5mL</button>
<button class="waterBtn" data-water="10">10mL</button>
</div>

<label>3. Target amount (mg)</label>
<input id="dose" type="number" value="1">

<div class="result">
<p>Draw:</p>
<div class="big" id="units">30</div>
<p>units</p>
<p id="summary"></p>
</div>
</div>

<div class="card">
<p><strong>Need to purchase your research peptides or BAC water (up to 10mL)?</strong></p>
<a class="linkBtn" href="https://www.luxeresearchco.com" target="_blank">Visit LUXE Research Co</a>
</div>

<div class="footer">
Educational use only. Verify all measurements.
</div>

</div>

<script>
let vial = 10;
let water = 3;

const vialSelect = document.getElementById("vialSelect");
const doseInput = document.getElementById("dose");
const unitsDisplay = document.getElementById("units");
const summary = document.getElementById("summary");

function calculate(){
let dose = Number(doseInput.value);
let concentration = vial / water;
let ml = dose / concentration;
let units = ml * 100;

unitsDisplay.innerText = units.toFixed(1);
summary.innerText = `${vial}mg vial with ${water}mL = ${concentration.toFixed(2)} mg/mL`;
}

vialSelect.addEventListener("change", function(){
vial = Number(this.value);
calculate();
});

document.querySelectorAll(".waterBtn").forEach(btn => {
btn.addEventListener("click", function(){
document.querySelectorAll(".waterBtn").forEach(b=>b.classList.remove("active"));
this.classList.add("active");
water = Number(this.dataset.water);
calculate();
});
});

doseInput.addEventListener("input", calculate);

calculate();
</script>

</body>
</html>
